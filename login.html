<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | SKYBLUE Airlines</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0081ff;
            --dark-blue: #0056b3;
            --sky-gradient: linear-gradient(135deg, #0081ff 0%, #e9f2ff 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--sky-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contenedor-login {
            display: flex;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 850px;
            max-width: 95%;
            min-height: 550px;
        }

        .columna-formulario {
            flex: 1;
            padding: 45px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contenedor-logo {
            margin-bottom: 30px;
            text-align: left;
        }

        .texto-logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-blue);
            letter-spacing: 2px;
        }

        h2 {
            font-size: 26px;
            color: #333;
            margin-bottom: 25px;
            margin-top: 0;
            font-weight: 600;
        }

        .campo-entrada {
            margin-bottom: 20px;
        }

        .campo-entrada label {
            display: block;
            font-size: 13px;
            color: #777;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .campo-entrada input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .campo-entrada input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        .enlace-olvido {
            display: block;
            text-align: right;
            font-size: 14px;
            color: var(--primary-blue);
            text-decoration: none;
            margin-bottom: 25px;
        }

        .boton-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .boton-login:hover {
            background-color: var(--dark-blue);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 129, 255, 0.3);
        }

        .enlace-registro {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .enlace-registro a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: bold;
        }

        .columna-imagen {
            flex: 1.2;
            background-image: url('https://images.unsplash.com/photo-1436491865332-7a61a109c0f3?auto=format&fit=crop&w=800&q=80'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .columna-imagen::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 86, 179, 0.3); 
            z-index: 1;
        }

        .frase-bienvenida {
            z-index: 2;
            text-align: center;
            padding: 20px;
            color: #fff;
        }

        .frase-bienvenida h1 {
            font-size: 36px;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .frase-bienvenida p {
            font-size: 18px;
            opacity: 0.9;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="contenedor-login">
    <div class="columna-formulario">
        <div class="contenedor-logo">
            <div class="texto-logo">SKYBLUE</div>
        </div>

        <h2>Bienvenido de nuevo, listo para viajar</h2>
        <form id="formulario-login">
            <div class="campo-entrada">
                <label for="correo">CORREO ELECTRÓNICO</label>
                <input type="email" id="correo" name="correo" placeholder="usuario@correo.com" required>
            </div>
            <div class="campo-entrada">
                <label for="contrasena">CONTRASEÑA</label>
                <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required>
            </div>
            <a href="#" class="enlace-olvido">¿Olvidaste tu contraseña?</a>
            
            <button type="submit" class="boton-login">INICIAR SESIÓN</button>

            <button type="button" id="btn-google" class="boton-login" style="background-color: #db4437; margin-top: 15px;">
                <i class="fab fa-google"></i> INICIAR CON GOOGLE
            </button>

            <div class="enlace-registro">
                ¿Nuevo en SKYBLUE? <a href="registro.html">Crea una cuenta</a>
            </div>
        </form>
    </div>
    
    <div class="columna-imagen">
        <div class="frase-bienvenida">
            <h1>SKYBLUE</h1>
            <p>El mundo te espera.</p>
        </div>
    </div>
</div>


<script type="module">
    import { auth } from './firebase-config.js';
    import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const formulario = document.getElementById('formulario-login');
    const btnGoogle = document.getElementById('btn-google');
    const googleProvider = new GoogleAuthProvider();

    // Verificar protocolo
    if (window.location.protocol === 'file:') {
        console.warn("⚠️ Google Auth requiere http://localhost, no file://");
    }

    // Google Login
    btnGoogle.addEventListener('click', async () => {
        if (window.location.protocol === 'file:') {
            alert("⚠️ Google Login NO funciona abriendo el archivo directamente.\n\nUsa: http://localhost:8080/login.html");
            return;
        }

        try {
            await signInWithPopup(auth, googleProvider);
            window.location.href = 'index.html';
        } catch (error) {
            console.error(error);
            alert('Error con Google: ' + error.message);
        }
    });

    // Login Correo
    formulario.addEventListener('submit', async function(evento) {
        evento.preventDefault();
        const correo = document.getElementById('correo').value;
        const contrasena = document.getElementById('contrasena').value;

        try {
            await signInWithEmailAndPassword(auth, correo, contrasena);
            window.location.href = 'index.html';
        } catch (error) {
            console.error(error);
            let mensaje = 'Error: ' + error.message;
            if (error.code === 'auth/invalid-credential') mensaje = 'Credenciales inválidas.';
            if (error.code === 'auth/user-not-found') mensaje = 'Usuario no encontrado.';
            if (error.code === 'auth/wrong-password') mensaje = 'Contraseña incorrecta.';
            alert(mensaje);
        }
    });
</script>

</body>
</html>
