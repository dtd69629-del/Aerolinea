<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYBLUE - Tu Boarding Pass</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39+Text&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00a8e8;
            --secondary: #003459;
            --white: #ffffff;
            --bg-gradient: linear-gradient(135deg, #003459 0%, #00a8e8 100%);
            --gray: #8d99ae;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor del Ticket */
        .ticket-container {
            background: var(--white);
            width: 100%;
            max-width: 850px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* --- Parte Izquierda (Información Principal) --- */
        .ticket-main {
            flex: 2.5;
            padding: 2rem;
            position: relative;
            border-right: 2px dashed #ddd;
        }

        /* Los semicírculos para el efecto de corte */
        .ticket-main::before, .ticket-main::after {
            content: '';
            position: absolute;
            right: -15px;
            width: 30px;
            height: 30px;
            background: #006da4; /* Debe coincidir con el fondo detrás del ticket si es sólido, aquí ajustado visualmente */
            border-radius: 50%;
        }
        
        /* Hack visual para el fondo degradado: usamos el color promedio o transparente si el fondo es complejo */
        .ticket-main::before { top: -15px; background-color: #004b7d; } 
        .ticket-main::after { bottom: -15px; background-color: #0092d6; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: 1px; }
        .class-badge { background: var(--secondary); color: white; padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }

        /* Ruta Grande */
        .route-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .city-code h1 { font-size: 3.5rem; color: var(--secondary); line-height: 1; }
        .city-code span { font-size: 0.9rem; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }
        
        .plane-icon {
            color: var(--primary);
            font-size: 2rem;
            border: 2px solid #eee;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,168,232,0.2);
        }

        /* Grid de detalles */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .info-box label { display: block; font-size: 0.75rem; color: var(--gray); text-transform: uppercase; margin-bottom: 2px; }
        .info-box p { font-size: 1.1rem; font-weight: 600; color: var(--secondary); }

        /* --- Parte Derecha (Stub / Desprendible) --- */
        .ticket-stub {
            flex: 1;
            padding: 2rem;
            background: #fcfcfc;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }

        .seat-display {
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
        }
        .seat-display span { font-size: 0.8rem; opacity: 0.9; }
        .seat-display h2 { font-size: 2.5rem; line-height: 1; }

        .barcode {
            font-family: 'Libre Barcode 39 Text', cursive;
            font-size: 2.5rem;
            color: #333;
            transform: scaleY(1.5);
            margin-top: 10px;
            opacity: 0.7;
        }

        /* Botón de acción flotante */
        .actions {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 20px;
        }

        .btn-action {
            background: white;
            color: var(--secondary);
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-action.primary { background: var(--primary); color: white; }
        .btn-action:hover { transform: translateY(-5px); }

        @media (max-width: 768px) {
            .ticket-container { flex-direction: column; margin-bottom: 80px; }
            .ticket-main { border-right: none; border-bottom: 2px dashed #ddd; }
            .ticket-main::before, .ticket-main::after { display: none; } /* Ocultar muescas en móvil */
            .details-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="ticket-container">
        <div class="ticket-main">
            <div class="header">
                <a href="#" class="logo"><i class="fas fa-plane"></i> SKYBLUE</a>
                <span class="class-badge" id="t-clase">ECONOMY</span>
            </div>

            <div class="route-display">
                <div class="city-code">
                    <h1 id="code-origin">MEX</h1>
                    <span id="name-origin">Ciudad de México</span>
                </div>
                <div class="plane-icon">
                    <i class="fas fa-plane"></i>
                </div>
                <div class="city-code" style="text-align: right;">
                    <h1 id="code-dest">CDG</h1>
                    <span id="name-dest">París</span>
                </div>
            </div>

            <div class="details-grid">
                <div class="info-box">
                    <label>Pasajero</label>
                    <p id="t-pasajero">Pasajero</p>
                </div>
                <div class="info-box">
                    <label>Fecha</label>
                    <p id="t-fecha">12 OCT</p>
                </div>
                <div class="info-box">
                    <label>Vuelo</label>
                    <p id="t-vuelo">SB-102</p>
                </div>
                <div class="info-box">
                    <label>Hora</label>
                    <p id="t-hora">08:00</p>
                </div>
                <div class="info-box">
                    <label>Puerta</label>
                    <p id="t-gate">A12</p>
                </div>
                <div class="info-box">
                    <label>Abordaje</label>
                    <p id="t-boarding">07:20</p>
                </div>
            </div>
        </div>

        <div class="ticket-stub">
            <div>
                <small style="color: var(--gray);">BOARDING PASS</small>
                <div class="seat-display">
                    <span>ASIENTO</span>
                    <h2 id="t-asiento">---</h2>
                </div>
                <div class="info-box">
                    <label>Confirmación</label>
                    <p style="letter-spacing: 2px;">#XYZ88</p>
                </div>
            </div>
            
            <div style="margin-top: 10px;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=SkyblueBoardingPass" alt="QR">
            </div>
            
            <div class="barcode">
                *SKYBLUE123*
            </div>
        </div>
    </div>

    <div class="actions">
        <button onclick="window.location.href='index.html'" class="btn-action"><i class="fas fa-home"></i> Inicio</button>
        <button onclick="window.print()" class="btn-action primary"><i class="fas fa-print"></i> Imprimir / Guardar PDF</button>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Verificar autenticación y guardar ticket
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Guardar nombre del usuario
            const userName = user.displayName || localStorage.getItem('userName') || user.email.split('@')[0];
            localStorage.setItem('userName', userName);

            // 1. Recuperar datos
            const origen = localStorage.getItem('origen') || 'Origen';
            const destino = localStorage.getItem('destino') || 'Destino';
            const vuelo = localStorage.getItem('vueloSel') || 'SB-000';
            const asiento = localStorage.getItem('asientoFinal') || 'ANY';
            const claseRaw = localStorage.getItem('claseAsiento') || 'economy';
            const horarioRaw = localStorage.getItem('horarioSel') || '00:00 - 00:00';
            const precioSel = localStorage.getItem('precioSel') || '0.00';
            const nombrePasajero = localStorage.getItem('userName') || 'Pasajero';

            // 2. Procesar datos
            const codeOrg = origen.substring(0,3).toUpperCase();
            const codeDst = destino.substring(0,3).toUpperCase();
            const horaSalida = horarioRaw.split(' - ')[0] || '10:00';
            
            // Fecha de hoy
            const today = new Date();
            const dateStr = today.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }).toUpperCase();

            // Generar Puerta Aleatoria
            const gate = 'B' + Math.floor(Math.random() * 20 + 1);

            // Formatear Clase
            let claseBonita = 'ECONOMY';
            if(claseRaw === 'first') claseBonita = 'FIRST CLASS';
            if(claseRaw === 'standard') claseBonita = 'BUSINESS';

            // 3. Insertar en el HTML
            document.getElementById('name-origin').innerText = origen;
            document.getElementById('code-origin').innerText = codeOrg;
            document.getElementById('name-dest').innerText = destino;
            document.getElementById('code-dest').innerText = codeDst;
            document.getElementById('t-pasajero').innerText = nombrePasajero;
            document.getElementById('t-vuelo').innerText = vuelo;
            document.getElementById('t-asiento').innerText = asiento;
            document.getElementById('t-clase').innerText = claseBonita;
            document.getElementById('t-fecha').innerText = dateStr;
            document.getElementById('t-hora').innerText = horaSalida;
            document.getElementById('t-gate').innerText = gate;
            document.getElementById('t-boarding').innerText = "40 min antes";

            // Cambiar color del badge según clase
            const badge = document.getElementById('t-clase');
            if(claseRaw === 'first') badge.style.background = '#f4c542';
            if(claseRaw === 'standard') badge.style.background = '#00a8e8';

            // 4. Guardar ticket en MongoDB
            const ticketData = {
                uid: user.uid,
                passengerName: nombrePasajero,
                origin: origen,
                destination: destino,
                date: dateStr,
                time: horaSalida,
                seat: asiento,
                class: claseBonita,
                price: precioSel,
                flightNumber: vuelo
            };

            try {
                const response = await fetch('http://localhost:3000/tickets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(ticketData)
                });
                
                if (response.ok) {
                    console.log('✅ Ticket guardado en historial');
                } else {
                    console.error('❌ Error al guardar ticket');
                }
            } catch (error) {
                console.error('❌ Error conectando con servidor:', error);
            }
        });
    </script>
</body>
</html>
