<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SKYBLUE - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--primary);">
    <div class="card" style="width: 400px; text-align: center;">
        <h2 style="color: var(--primary); margin-bottom: 1.5rem;">SKYBLUE</h2>
        <form action="index.html">
            <input type="email" placeholder="Correo electrónico" style="width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 5px;">
            <input type="password" placeholder="Contraseña" style="width: 100%; padding: 12px; margin-bottom: 1.5rem; border: 1px solid #ddd; border-radius: 5px;">
            <button type="submit" class="btn-primary" style="width: 100%;">ENTRAR</button>
        </form>
        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-gray);">¿No tienes cuenta? <a href="#">Regístrate</a></p>
    </div>
</body>
</html>
